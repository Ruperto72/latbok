<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Körhäftet — Ackord & Text</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8a84b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Körhäftet">
</head>
<body>

<a class="skip-link" href="#songDisplay">Hoppa till innehåll</a>
<button class="menu-toggle" onclick="toggleSidebar()" aria-label="Öppna/stäng meny" aria-expanded="false" aria-controls="sidebar">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()" role="presentation"></div>

<div class="app">
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Låtlista">
    <div class="sidebar-header">
      <h1>Körhäftet</h1>
      <p aria-live="polite">Laddar låtar...</p>
    </div>
    <div class="song-list" id="songList" role="list" aria-label="Låtar"></div>
    <div class="sidebar-footer">
      <button class="reload-btn" id="reloadSongsBtn" onclick="reloadSongs()">↺ Ladda om låtar</button>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="song-display" id="songDisplay" role="region" aria-label="Låtvisning" aria-live="polite">
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim)">
        <p style="font-size:40px;margin-bottom:12px" aria-hidden="true">🎸</p>
        <p style="font-family:'JetBrains Mono',monospace;font-size:13px">Laddar...</p>
      </div>
    </div>

    <!-- Mobile bottom bar (hidden on desktop via CSS) -->
    <div class="mobile-bar" id="mobileBar" role="toolbar" aria-label="Mobilmeny">
      <button class="mobile-bar__btn" onclick="toggleSidebar()" aria-label="Öppna/stäng låtlista">☰</button>
      <button class="mobile-bar__scroll" id="mobileScrollBtn" onclick="toggleAutoScroll()" aria-pressed="false" aria-label="Autoscroll">▶ Scrolla</button>
      <button class="mobile-bar__btn" id="mobileSettingsBtn" onclick="toggleSettingsSheet()" aria-label="Inställningar" aria-expanded="false">⚙</button>
    </div>

    <!-- Mobile settings sheet (slides up from behind the bottom bar) -->
    <div class="mobile-sheet" id="mobileSheet" role="dialog" aria-label="Inställningar" aria-hidden="true" aria-modal="true">
      <div class="mobile-sheet__handle"></div>
      <div class="mobile-sheet__row">
        <span class="mobile-sheet__label">Textstorlek</span>
        <div class="mobile-sheet__ctrl">
          <button onclick="changeFontSize(-1)" aria-label="Minska textstorlek">−</button>
          <span id="mobileFontLabel">13</span>
          <button onclick="changeFontSize(1)" aria-label="Öka textstorlek">+</button>
        </div>
      </div>
      <div class="mobile-sheet__row">
        <span class="mobile-sheet__label">Ackord</span>
        <button class="mobile-sheet__toggle mobile-sheet__toggle--on" id="mobileHideChordsBtn" onclick="toggleHideChords()" aria-pressed="true">Visas</button>
      </div>
      <div class="mobile-sheet__row">
        <span class="mobile-sheet__label">Transponera</span>
        <div class="mobile-sheet__ctrl">
          <button onclick="transpose(-1)" aria-label="Transponera ner ett halvsteg">♭</button>
          <button onclick="transpose(1)" aria-label="Transponera upp ett halvsteg">♯</button>
        </div>
      </div>
      <div class="mobile-sheet__row">
        <span class="mobile-sheet__label">Scrollhastighet</span>
        <div class="mobile-sheet__ctrl">
          <button onclick="changeScrollSpeed(-1)" aria-label="Minska scrollhastighet">−</button>
          <span id="mobileScrollSpeedLabel">3</span>
          <button onclick="changeScrollSpeed(1)" aria-label="Öka scrollhastighet">+</button>
        </div>
      </div>
      <div class="mobile-sheet__row mobile-sheet__row--desktop-only" id="mobileColRow">
        <span class="mobile-sheet__label">Kolumner</span>
        <button class="mobile-sheet__toggle" id="mobileColBtn" onclick="toggleColumns()" aria-label="Byt kolumnläge">1 kolumn</button>
      </div>
      <div class="mobile-sheet__row mobile-sheet__row--desktop-only" id="mobileEditorRow">
        <span class="mobile-sheet__label">Redigera låt</span>
        <button class="mobile-sheet__toggle" id="mobileEditorBtn" onclick="toggleSongEditor()" aria-pressed="false">Av</button>
      </div>
      <div class="mobile-sheet__row mobile-sheet__row--desktop-only" id="mobileArchiveRow">
        <span class="mobile-sheet__label">Arkiv</span>
        <div style="display: flex; gap: 8px;">
          <button class="mobile-sheet__toggle" id="mobileArchiveBtn" onclick="toggleArchiveSong()">Arkivera</button>
          <button class="mobile-sheet__toggle" onclick="showArchivePage()">Öppna</button>
        </div>
      </div>
      <div class="mobile-sheet__row">
        <span class="mobile-sheet__label">Ladda om</span>
        <button class="mobile-sheet__toggle" id="mobileReloadBtn" onclick="reloadSongs()">↺ Läs in låtar</button>
      </div>
    </div>
    <div class="mobile-sheet-backdrop" id="mobileSheetBackdrop" onclick="closeSettingsSheet()" aria-hidden="true"></div>
  </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
